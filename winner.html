<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>مبروك | Creativity Oasis</title>
  <style>
    :root {
      --orange: #F1684A;
      --light-orange: #FCB451;
      --navy: #323858;
      --green: #6FAD6C;
      --warm-white: #EEEBE0;
      --panel: #FAF9F4;
      --font-ar: "Omnes Arabic", "DIN Next Arabic", "Noto Kufi Arabic", Tahoma, Arial, sans-serif;
      --font-en: "Ara Hamah City", "Avenir Next", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--warm-white);
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--navy);
      font-family: var(--font-ar);
      background: var(--warm-white);
    }

    body::before,
    body::after {
      position: fixed;
      z-index: -1;
      width: 28vw;
      height: 28vw;
      min-width: 160px;
      min-height: 160px;
      content: "";
      opacity: 0.22;
    }

    body::before {
      top: 0;
      left: 0;
      background: var(--green);
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }

    body::after {
      right: 0;
      bottom: 0;
      background: var(--light-orange);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .page {
      width: min(900px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: clamp(16px, 3vh, 26px) 0 20px;
    }

    .brand {
      display: grid;
      place-items: center;
      padding: 0 0 10px;
    }

    .brand img {
      display: block;
      width: min(330px, 82vw);
      height: auto;
      max-height: 162px;
      object-fit: contain;
    }

    .result {
      align-self: center;
      display: grid;
      gap: 22px;
      padding: clamp(24px, 4vw, 36px);
      border: 2px solid rgba(111, 173, 108, 0.56);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(50, 56, 88, 0.12);
      text-align: center;
    }

    .accent {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      direction: ltr;
    }

    .accent span {
      display: block;
      height: 8px;
      border-radius: 999px;
    }

    .accent span:nth-child(1) { background: var(--navy); }
    .accent span:nth-child(2) { background: var(--green); }
    .accent span:nth-child(3) { background: var(--light-orange); }
    .accent span:nth-child(4) { background: var(--orange); }

    h1,
    p {
      margin: 0;
    }

    .status-icon {
      justify-self: center;
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(50, 56, 88, 0.14);
      border-radius: 8px;
      color: var(--navy);
      background: rgba(252, 180, 81, 0.22);
    }

    .status-icon svg {
      width: 44px;
      height: 44px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    h1 {
      color: var(--orange);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .lead {
      color: var(--navy);
      font-size: clamp(1.05rem, 2.7vw, 1.28rem);
      line-height: 1.85;
    }

    .english {
      direction: ltr;
      color: var(--navy);
      font-family: var(--font-en);
      font-size: clamp(0.96rem, 2.3vw, 1.08rem);
      font-weight: 500;
      line-height: 1.7;
    }

    .claim {
      width: fit-content;
      max-width: 100%;
      margin-inline: auto;
      padding: 12px 18px;
      border: 1px solid rgba(50, 56, 88, 0.18);
      border-radius: 8px;
      color: var(--navy);
      background: rgba(238, 235, 224, 0.78);
      font-family: var(--font-en);
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.4;
      direction: ltr;
    }

    footer {
      color: rgba(50, 56, 88, 0.76);
      font-family: var(--font-en);
      font-size: 0.9rem;
      line-height: 1.6;
      text-align: center;
      direction: ltr;
    }

    #confetti {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 20;
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 24px, 900px);
      }

      .brand img {
        width: min(305px, 86vw);
      }
    }
  </style>
</head>
<body>
  <canvas id="confetti" aria-hidden="true"></canvas>
  <main class="page" aria-labelledby="result-title">
    <header class="brand">
      <img src="logo.png" alt="واحة الابتكار Creativity Oasis">
    </header>

    <section class="result" aria-live="polite">
      <div class="accent" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="status-icon" aria-hidden="true">
        <svg viewBox="0 0 48 48">
          <path d="M8 15a5 5 0 0 1 5-5h30v10a4 4 0 0 0 0 8v10H13a5 5 0 0 1-5-5V15Z"></path>
          <path d="m18 25 5 5 11-12"></path>
        </svg>
      </div>

      <h1 id="result-title">مبروك! ربحت ورشة مجانية</h1>
      <p class="lead">أظهر هذه الصفحة لفريق واحة الابتكار واذكر رمز المطالبة لتأكيد جائزتك.</p>
      <p class="english">Congratulations! Show this page to the Creativity Oasis team and share the claim code to redeem your workshop.</p>
      <p class="claim">Claim code: WC26</p>
    </section>

    <footer>Creativity Oasis</footer>
  </main>

  <script>
    function startConfetti() {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        return;
      }

      const canvas = document.getElementById("confetti");
      const context = canvas.getContext("2d");
      const colors = ["#F1684A", "#FCB451", "#323858", "#6FAD6C", "#EEEBE0"];
      const pieces = [];
      const count = 120;
      let frame = 0;

      function resize() {
        canvas.width = Math.floor(window.innerWidth * window.devicePixelRatio);
        canvas.height = Math.floor(window.innerHeight * window.devicePixelRatio);
        context.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      resize();
      window.addEventListener("resize", resize, { passive: true });

      for (let index = 0; index < count; index += 1) {
        pieces.push({
          x: Math.random() * window.innerWidth,
          y: -24 - Math.random() * window.innerHeight * 0.35,
          size: 7 + Math.random() * 9,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: 2.3 + Math.random() * 3.9,
          tilt: Math.random() * Math.PI,
          spin: -0.08 + Math.random() * 0.16,
          drift: -1.1 + Math.random() * 2.2
        });
      }

      function draw() {
        context.clearRect(0, 0, window.innerWidth, window.innerHeight);
        for (const piece of pieces) {
          piece.y += piece.speed;
          piece.x += piece.drift;
          piece.tilt += piece.spin;
          context.save();
          context.translate(piece.x, piece.y);
          context.rotate(piece.tilt);
          context.fillStyle = piece.color;
          context.fillRect(-piece.size / 2, -piece.size / 3, piece.size, piece.size / 1.7);
          context.restore();
          if (piece.y > window.innerHeight + 28) {
            piece.y = -28;
            piece.x = Math.random() * window.innerWidth;
          }
        }
        frame += 1;
        if (frame < 260) {
          window.requestAnimationFrame(draw);
        } else {
          context.clearRect(0, 0, window.innerWidth, window.innerHeight);
          window.removeEventListener("resize", resize);
        }
      }

      window.requestAnimationFrame(draw);
    }

    startConfetti();
  </script>
</body>
</html>
